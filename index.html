<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#2C3E50">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png">
<title>WinLose</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Hiragino Sans', 'Noto Sans JP', -apple-system, sans-serif; background: #E4F3FF; overscroll-behavior: none; }
  input[type="number"]::-webkit-inner-spin-button, input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  input[type="number"] { -moz-appearance: textfield; }
  ::-webkit-scrollbar { display: none; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const STORAGE_KEY = "cashbook-data";
const CATEGORIES_KEY = "cashbook-categories";
const CAT_COLORS_KEY = "cashbook-cat-colors";
const DEFAULT_CATEGORIES = ["食費", "交通費", "日用品", "趣味", "医療費", "その他"];

const COLOR_PALETTE = (() => {
  const hues = [0, 30, 60, 90, 120, 150, 180, 210, 240, 270, 300, 330];
  const saturations = [20, 35, 50, 60, 70, 80, 95];
  const colors = [];
  saturations.forEach((s) => { hues.forEach((h) => { colors.push(`hsl(${h}, ${s}%, 50%)`); }); });
  return colors;
})();

const DEFAULT_CAT_COLORS = { "食費": "#E8735A", "交通費": "#5B8DEF", "日用品": "#4FC4A0", "趣味": "#F2A74B", "医療費": "#9B7BDB", "その他": "#90A4AE" };

// localStorage wrappers (async-compatible interface)
function loadLS(key, fallback) { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch { return fallback; } }
function saveLS(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) { console.error(e); } }

function getCatColor(cc, name) { if (cc[name]) return cc[name]; let h=0; for(let i=0;i<name.length;i++) h=(h*31+name.charCodeAt(i))&0xffff; return COLOR_PALETTE[h%COLOR_PALETTE.length]; }
function dateKey(y,m,d) { return `${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`; }
function formatNum(n) { const a=Math.abs(Number(n)); if(a<1000) return String(a); const k=a/1000; return k%1===0?`${k}k`:`${k.toFixed(1)}k`; }
function fmtYM(y,m) { return `${y}/${String(m+1).padStart(2,"0")}`; }
function fmtYMD(ds) { const d=new Date(ds); return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,"0")}/${String(d.getDate()).padStart(2,"0")}`; }
const DOW_EN=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
function getWinLose(a){return Number(a)>=0?"win":"lose";}
function winLoseColor(w){return w==="win"?"#4FC4A0":"#E8735A";}
function winLosePrefix(w){return w==="win"?"+":"-";}

const EmptyListIcon=()=>(<svg width="48" height="48" viewBox="0 0 48 48" fill="none" stroke="#CCCAC4" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><rect x="8" y="6" width="32" height="36" rx="3"/><line x1="16" y1="16" x2="32" y2="16"/><line x1="16" y1="24" x2="28" y2="24"/><line x1="16" y1="32" x2="24" y2="32"/></svg>);
const EmptyTagIcon=()=>(<svg width="48" height="48" viewBox="0 0 48 48" fill="none" stroke="#CCCAC4" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M41.2 26.8l-14.3 14.3a4 4 0 0 1-5.66 0L4 24V4h20l17.2 17.2a4 4 0 0 1 0 5.6z"/><circle cx="14" cy="14" r="3"/></svg>);
const IconCalendar=({color})=>(<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>);
const IconList=({color})=>(<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="4" cy="6" r="1" fill={color}/><circle cx="4" cy="12" r="1" fill={color}/><circle cx="4" cy="18" r="1" fill={color}/></svg>);
const IconTag=({color})=>(<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><circle cx="7" cy="7" r="1.5" fill={color}/></svg>);

function calcWL(entries,fn){let w=0,l=0,wc=0,lc=0;Object.keys(entries).filter(fn||(()=>true)).forEach(k=>{entries[k].forEach(e=>{const n=Number(e.amount)||0;if(n>=0){w+=n;wc++;}else{l+=Math.abs(n);lc++;}});});return{win:w,lose:l,net:w-l,winCount:wc,loseCount:lc};}

function App(){
  const today=new Date();
  const[year,setYear]=useState(today.getFullYear());
  const[month,setMonth]=useState(today.getMonth());
  const[entries,setEntries]=useState(()=>loadLS(STORAGE_KEY,{}));
  const[categories,setCategories]=useState(()=>loadLS(CATEGORIES_KEY,DEFAULT_CATEGORIES));
  const[catColors,setCatColors]=useState(()=>loadLS(CAT_COLORS_KEY,DEFAULT_CAT_COLORS));
  const[view,setView]=useState("calendar");
  const[selectedDate,setSelectedDate]=useState(null);
  const[showModal,setShowModal]=useState(false);
  const[editIdx,setEditIdx]=useState(null);
  const[listYear,setListYear]=useState(today.getFullYear());
  const touchStartX=useRef(0);

  useEffect(()=>{saveLS(STORAGE_KEY,entries);},[entries]);
  useEffect(()=>{saveLS(CATEGORIES_KEY,categories);},[categories]);
  useEffect(()=>{saveLS(CAT_COLORS_KEY,catColors);},[catColors]);

  const goMonth=useCallback((dir)=>{setMonth(prev=>{let m=prev+dir,y=year;if(m<0){m=11;setYear(y-1);}else if(m>11){m=0;setYear(y+1);}return m;});},[year]);
  const handleTouchStart=(e)=>{touchStartX.current=e.touches[0].clientX;};
  const handleTouchEnd=(e)=>{const diff=touchStartX.current-e.changedTouches[0].clientX;if(Math.abs(diff)>60)goMonth(diff>0?1:-1);};

  const addEntry=(dk,entry)=>{setEntries(p=>({...p,[dk]:[...(p[dk]||[]),entry]}));};
  const updateEntry=(dk,idx,entry)=>{setEntries(p=>{const a=[...(p[dk]||[])];a[idx]=entry;return{...p,[dk]:a};});};
  const deleteEntry=(dk,idx)=>{setEntries(p=>{const a=[...(p[dk]||[])];a.splice(idx,1);const n={...p};if(a.length===0)delete n[dk];else n[dk]=a;return n;});};

  const prefix=`${year}-${String(month+1).padStart(2,"0")}`;
  const monthWL=calcWL(entries,k=>k.startsWith(prefix));
  const openAdd=(dk)=>{setSelectedDate(dk);setEditIdx(null);setShowModal(true);};
  const openEdit=(dk,idx)=>{setSelectedDate(dk);setEditIdx(idx);setShowModal(true);};
  const addCategory=(name)=>{if(name&&!categories.includes(name))setCategories([...categories,name]);};

  const headerContent=(()=>{
    if(view==="calendar")return(<div style={S.headerTop}><div style={S.headerYM}>{fmtYM(year,month)}</div><div style={S.headerRight}><div style={S.headerWL}><span style={S.headerWin}>win｜{monthWL.winCount} , +{formatNum(monthWL.win)}</span><span style={S.headerLose}>lose｜{monthWL.loseCount} , -{formatNum(monthWL.lose)}</span></div><div style={{...S.headerNet,color:monthWL.net>=0?"#4FC4A0":"#E8735A"}}>{monthWL.net>=0?"+":"-"}{formatNum(monthWL.net)}</div></div></div>);
    if(view==="list")return<div style={S.headerTitle}>結果一覧</div>;
    return<div style={S.headerTitle}>カテゴリー</div>;
  })();

  return(
    <div style={S.root}>
      <div style={S.header}>{headerContent}</div>
      <div style={S.content}>
        {view==="calendar"&&<VerticalCalendar year={year} month={month} entries={entries} categories={categories} catColors={catColors} goMonth={goMonth} onDayTap={openAdd} onEntryTap={openEdit} onSwipeStart={handleTouchStart} onSwipeEnd={handleTouchEnd}/>}
        {view==="list"&&<YearListView entries={entries} categories={categories} catColors={catColors} onEdit={openEdit} listYear={listYear} setListYear={setListYear}/>}
        {view==="category"&&<CategoryView entries={entries} categories={categories} catColors={catColors} setCategories={setCategories} setCatColors={setCatColors} onEdit={openEdit}/>}
      </div>
      <div style={S.bottomTabs}>
        {[{id:"calendar",Icon:IconCalendar},{id:"list",Icon:IconList},{id:"category",Icon:IconTag}].map(t=>{
          const active=view===t.id;const color=active?"#2C3E50":"#B0ADA6";
          return(<button key={t.id} style={S.bottomTab} onClick={()=>setView(t.id)}><t.Icon color={color}/>{active&&<div style={S.bottomTabDot}></div>}</button>);
        })}
      </div>
      {showModal&&<EntryModal dk={selectedDate} editIdx={editIdx} entry={editIdx!==null?entries[selectedDate]?.[editIdx]:null} categories={categories} catColors={catColors} onAddCategory={addCategory}
        onSave={(entry)=>{if(editIdx!==null)updateEntry(selectedDate,editIdx,entry);else addEntry(selectedDate,entry);setShowModal(false);}}
        onDelete={()=>{deleteEntry(selectedDate,editIdx);setShowModal(false);}} onClose={()=>setShowModal(false)}/>}
    </div>
  );
}

function VerticalCalendar({year,month,entries,categories,catColors,goMonth,onDayTap,onEntryTap,onSwipeStart,onSwipeEnd}){
  const lastDate=new Date(year,month+1,0).getDate();const todayKey=dateKey(new Date().getFullYear(),new Date().getMonth(),new Date().getDate());const todayRef=useRef(null);
  useEffect(()=>{if(todayRef.current)todayRef.current.scrollIntoView({block:"center",behavior:"smooth"});},[year,month]);
  return(
    <div onTouchStart={onSwipeStart} onTouchEnd={onSwipeEnd}>
      <div style={S.monthNav}><button style={S.navBtn} onClick={()=>goMonth(-1)}>◀</button><span style={S.monthLabel}>{fmtYM(year,month)}</span><button style={S.navBtn} onClick={()=>goMonth(1)}>▶</button></div>
      <div style={S.dayList}>{Array.from({length:lastDate},(_,i)=>{
        const d=i+1,dk=dateKey(year,month,d),dow=new Date(year,month,d).getDay();
        const isToday=dk===todayKey,dayEntries=entries[dk]||[],hasData=dayEntries.length>0,isSun=dow===0,isSat=dow===6;
        return(<div key={dk} ref={isToday?todayRef:null} style={{...S.dayRow,...(isToday?S.dayRowToday:{})}}>
          <button style={S.dateCol} onClick={()=>onDayTap(dk)}><span style={{...S.dateNum,...(isToday?S.dateNumToday:{}),color:isToday?"#fff":isSun?"#E8735A":isSat?"#5B8DEF":"#2C2C2C"}}>{d}</span><span style={{...S.dateDow,color:isSun?"#E8735A":isSat?"#5B8DEF":"#999"}}>{DOW_EN[dow]}</span></button>
          <div style={S.entriesCol}>
            {hasData?dayEntries.map((e,j)=>{const color=getCatColor(catColors,e.category);const wl=getWinLose(e.amount);
              return(<button key={j} style={S.entryChip} onClick={()=>onEntryTap(dk,j)}><span style={{...S.entryBar,background:color}}></span><span style={S.entryCat}>{e.category||"未分類"}</span><span style={S.entryMemo}>{e.memo||""}</span><span style={{...S.entryAmt,color:winLoseColor(wl)}}>{winLosePrefix(wl)}{formatNum(e.amount)}</span></button>);
            }):(<button style={S.entryEmpty} onClick={()=>onDayTap(dk)}><span style={S.entryEmptyPlus}>＋</span></button>)}
            {hasData&&dayEntries.length>1&&(()=>{const dw={win:0,lose:0};dayEntries.forEach(e=>{const n=Number(e.amount)||0;if(n>=0)dw.win+=n;else dw.lose+=Math.abs(n);});const net=dw.win-dw.lose;
              return(<div style={S.dayTotalRow}><span style={S.dayTotalLabel}>小計</span><span style={{...S.dayTotalAmt,color:net>=0?"#4FC4A0":"#E8735A"}}>{net>=0?"+":"-"}{formatNum(net)}</span></div>);})()}
          </div>
        </div>);
      })}</div>
    </div>
  );
}

function YearListView({entries,categories,catColors,onEdit,listYear,setListYear}){
  const yp=`${listYear}-`;const allKeys=Object.keys(entries).filter(k=>k.startsWith(yp)).sort();const yearWL=calcWL(entries,k=>k.startsWith(yp));
  const byMonth={};allKeys.forEach(k=>{const m=parseInt(k.split("-")[1],10);if(!byMonth[m])byMonth[m]=[];entries[k].forEach((e,i)=>byMonth[m].push({dk:k,idx:i,...e,date:k}));});
  return(<div>
    <div style={S.monthNav}><button style={S.navBtn} onClick={()=>setListYear(listYear-1)}>◀</button><span style={S.monthLabel}>{listYear}</span><button style={S.navBtn} onClick={()=>setListYear(listYear+1)}>▶</button></div>
    <div style={S.yearTotalBar}><div><span style={S.wlSmall}><span style={{color:"#4FC4A0"}}>win｜{yearWL.winCount} , +{formatNum(yearWL.win)}</span>  <span style={{color:"#E8735A"}}>lose｜{yearWL.loseCount} , -{formatNum(yearWL.lose)}</span></span></div><span style={{...S.yearTotalAmt,color:yearWL.net>=0?"#4FC4A0":"#E8735A"}}>{yearWL.net>=0?"+":"-"}{formatNum(yearWL.net)}</span></div>
    {Object.keys(byMonth).length===0?(<div style={S.emptyState}><EmptyListIcon/><div style={S.emptyText}>この年の記録はありません</div></div>):(
      <div style={S.listWrap}>{Object.keys(byMonth).sort((a,b)=>a-b).map(m=>{
        const items=byMonth[m];const mWL={win:0,lose:0};items.forEach(e=>{const n=Number(e.amount)||0;if(n>=0)mWL.win+=n;else mWL.lose+=Math.abs(n);});const mNet=mWL.win-mWL.lose;
        return(<div key={m}><div style={S.monthGroupHeader}><span>{fmtYM(listYear,m-1)}</span><span style={{fontWeight:700,fontSize:13,color:mNet>=0?"#4FC4A0":"#E8735A"}}>{mNet>=0?"+":"-"}{formatNum(mNet)}</span></div>
          {items.map(item=>{const color=getCatColor(catColors,item.category);const dd=new Date(item.date);const dayLabel=`${String(dd.getDate()).padStart(2,"0")} ${DOW_EN[dd.getDay()]}`;const wl=getWinLose(item.amount);
            return(<button key={`${item.dk}-${item.idx}`} style={S.listItem} onClick={()=>onEdit(item.dk,item.idx)}><div style={{...S.listCatBar,background:color}}></div><span style={S.listDate}>{dayLabel}</span><div style={S.listBody}><div style={S.listTop}><span style={{...S.listCat,color}}>{item.category||"未分類"}</span>{item.memo&&<span style={S.listMemoInline}>{item.memo}</span>}</div></div><span style={{...S.listAmt,color:winLoseColor(wl)}}>{winLosePrefix(wl)}{formatNum(item.amount)}</span></button>);
          })}</div>);
      })}</div>)}
  </div>);
}

function CategoryView({entries,categories,catColors,setCategories,setCatColors,onEdit}){
  const[showSettings,setShowSettings]=useState(false);const[activeTab,setActiveTab]=useState("all");
  const allKeys=Object.keys(entries).sort();const catData={};
  allKeys.forEach(k=>{entries[k].forEach((e,i)=>{const c=e.category||"未分類";if(!catData[c])catData[c]={win:0,lose:0,winCount:0,loseCount:0,items:[]};const n=Number(e.amount)||0;if(n>=0){catData[c].win+=n;catData[c].winCount++;}else{catData[c].lose+=Math.abs(n);catData[c].loseCount++;}catData[c].items.push({dk:k,idx:i,...e,date:k});});});
  const gW=Object.values(catData).reduce((s,d)=>s+d.win,0);const gL=Object.values(catData).reduce((s,d)=>s+d.lose,0);
  const gWC=Object.values(catData).reduce((s,d)=>s+d.winCount,0);const gLC=Object.values(catData).reduce((s,d)=>s+d.loseCount,0);const gN=gW-gL;
  const catTabs=Object.entries(catData).sort((a,b)=>(b[1].win+b[1].lose)-(a[1].win+a[1].lose));
  if(showSettings)return<CategorySettings categories={categories} catColors={catColors} setCategories={setCategories} setCatColors={setCatColors} onBack={()=>setShowSettings(false)}/>;
  const isAll=activeTab==="all";const acd=!isAll?catData[activeTab]:null;
  const aN=isAll?gN:acd?acd.win-acd.lose:0;const aW=isAll?gW:acd?acd.win:0;const aL=isAll?gL:acd?acd.lose:0;
  const aWC=isAll?gWC:acd?acd.winCount:0;const aLC=isAll?gLC:acd?acd.loseCount:0;
  return(<div>
    <div style={S.catNavBar}><div><div style={{...S.catNavTotal,color:aN>=0?"#4FC4A0":"#E8735A"}}>{aN>=0?"+":"-"}{formatNum(aN)}</div><div style={S.wlSmall}><span style={{color:"#4FC4A0"}}>win｜{aWC} , +{formatNum(aW)}</span>{"  "}<span style={{color:"#E8735A"}}>lose｜{aLC} , -{formatNum(aL)}</span></div></div>
      <button style={S.settingsGearBtn} onClick={()=>setShowSettings(true)}><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#888" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button></div>
    <div style={S.catTabsWrap}><div style={S.catTabsInner}><button style={{...S.catTabBtn,...(isAll?S.catTabBtnActive:{})}} onClick={()=>setActiveTab("all")}>全体</button>
      {catTabs.map(([cat])=>{const color=getCatColor(catColors,cat);const ia=activeTab===cat;return<button key={cat} style={{...S.catTabBtn,...(ia?{background:color,color:"#fff",borderColor:color}:{})}} onClick={()=>setActiveTab(cat)}>{cat}</button>;})}</div></div>
    {Object.keys(catData).length===0?(<div style={S.emptyState}><EmptyTagIcon/><div style={S.emptyText}>記録はありません</div></div>)
    :isAll?(<div style={S.catBreakdown}>
      {(gW+gL)>0&&(<div style={S.proportionBarWrap}><div style={S.proportionBar}>{catTabs.map(([cat,data])=>{const color=getCatColor(catColors,cat);const pct=((data.win+data.lose)/(gW+gL))*100;return<div key={cat} style={{...S.proportionSeg,background:color,width:`${pct}%`}}/>;})}</div></div>)}
      {catTabs.map(([cat,data])=>{const color=getCatColor(catColors,cat);const cN=data.win-data.lose;
        return(<button key={cat} style={S.catSummaryRow} onClick={()=>setActiveTab(cat)}><div style={S.catSectionLeft}><span style={{...S.catSectionDot,background:color}}></span><span style={S.catSectionName}>{cat}</span><span style={S.catSectionCount}>{data.items.length}件</span></div><div style={S.catSummaryRight}><span style={{...S.catSectionTotal,color:cN>=0?"#4FC4A0":"#E8735A"}}>{cN>=0?"+":"-"}{formatNum(cN)}</span><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#ccc" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg></div></button>);})}</div>)
    :acd?(<div style={S.catBreakdown}><div style={S.catSectionItems}>{acd.items.map(item=>{const fd=`${fmtYMD(item.date)} ${DOW_EN[new Date(item.date).getDay()]}`;const wl=getWinLose(item.amount);
      return(<button key={`${item.dk}-${item.idx}`} style={S.catEntryRow} onClick={()=>onEdit(item.dk,item.idx)}><span style={S.catEntryDate}>{fd}</span><span style={S.catEntryMemo}>{item.memo||"—"}</span><span style={{...S.catEntryAmt,color:winLoseColor(wl)}}>{winLosePrefix(wl)}{formatNum(item.amount)}</span></button>);})}</div></div>)
    :(<div style={S.emptyState}><EmptyTagIcon/><div style={S.emptyText}>このカテゴリの記録はありません</div></div>)}
  </div>);
}

function CategorySettings({categories,catColors,setCategories,setCatColors,onBack}){
  const[newCat,setNewCat]=useState("");const[editingIdx,setEditingIdx]=useState(null);const[editVal,setEditVal]=useState("");const[colorPickerIdx,setColorPickerIdx]=useState(null);
  const addCat=()=>{const v=newCat.trim();if(v&&!categories.includes(v)){setCategories([...categories,v]);setNewCat("");}};
  const setColor=(catName,color)=>{setCatColors({...catColors,[catName]:color});setColorPickerIdx(null);};
  return(<div style={S.settingsWrap}>
    <div style={S.settingsBackRow}><button style={S.backBtn} onClick={onBack}><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>戻る</button><span style={S.settingsTitle}>カテゴリ管理</span><div style={{width:60}}></div></div>
    <div style={S.settingsDesc}>カラーをタップで変更、名前をタップで編集</div>
    <div style={S.catList}>{categories.map((cat,i)=>{const color=getCatColor(catColors,cat);return(<div key={i}><div style={S.catItem}>
      <button style={{...S.catColorBtn,background:color}} onClick={()=>setColorPickerIdx(colorPickerIdx===i?null:i)}/>
      {editingIdx===i?(<div style={S.catEditRow}><input style={S.catEditInput} value={editVal} onChange={e=>setEditVal(e.target.value)} onKeyDown={e=>e.key==="Enter"&&(()=>{if(editVal.trim()){const u=[...categories];const old=u[i];u[i]=editVal.trim();setCategories(u);if(catColors[old]){const nc={...catColors};nc[editVal.trim()]=nc[old];delete nc[old];setCatColors(nc);}}setEditingIdx(null);})()} autoFocus/><button style={S.catEditSave} onClick={()=>{if(editVal.trim()){const u=[...categories];const old=u[i];u[i]=editVal.trim();setCategories(u);if(catColors[old]){const nc={...catColors};nc[editVal.trim()]=nc[old];delete nc[old];setCatColors(nc);}}setEditingIdx(null);}}>✓</button></div>)
      :(<span style={S.catItemLabel} onClick={()=>{setEditingIdx(i);setEditVal(categories[i]);}}>{cat}</span>)}
    </div>
    {colorPickerIdx===i&&(<div style={S.colorPaletteWrap}><div style={S.colorPaletteGrid}>{COLOR_PALETTE.map(c=>(<button key={c} style={{...S.colorSwatch,background:c,...(c===color?S.colorSwatchActive:{})}} onClick={()=>setColor(cat,c)}/>))}</div></div>)}
    </div>);})}</div>
    <div style={S.addCatRow}><input style={S.addCatInput} value={newCat} onChange={e=>setNewCat(e.target.value)} placeholder="新しいカテゴリを追加" onKeyDown={e=>e.key==="Enter"&&addCat()}/><button style={S.addCatBtn} onClick={addCat}>追加</button></div>
  </div>);
}

function EntryModal({dk,editIdx,entry,categories,catColors,onAddCategory,onSave,onDelete,onClose}){
  const[amount,setAmount]=useState(entry?.amount?.toString()||"");const[memo,setMemo]=useState(entry?.memo||"");const[category,setCategory]=useState(entry?.category||"");
  const[showNewCat,setShowNewCat]=useState(false);const[newCatName,setNewCatName]=useState("");
  const isEdit=editIdx!==null;const d=new Date(dk);const label=`${fmtYMD(dk)} (${DOW_EN[d.getDay()]})`;const numAmount=Number(amount);const valid=amount&&!isNaN(numAmount);const wl=valid?getWinLose(numAmount):null;
  const handleAddNewCat=()=>{const v=newCatName.trim();if(v){onAddCategory(v);setCategory(v);setNewCatName("");setShowNewCat(false);}};
  return(<div style={S.overlay} onClick={onClose}><div style={S.modal} onClick={e=>e.stopPropagation()}>
    <div style={S.modalHeader}><span style={S.modalDate}>{label}</span><button style={S.modalClose} onClick={onClose}>✕</button></div>
    <div style={S.modalField}><label style={S.modalLabel}>金額</label><div style={S.amountRow}><input style={S.amountInput} type="number" inputMode="numeric" value={amount} onChange={e=>setAmount(e.target.value)} placeholder="0" autoFocus/></div>{valid&&<div style={{...S.winLoseBadge,background:wl==="win"?"#E8F5E9":"#FDE8E8",color:winLoseColor(wl)}}>{wl==="win"?"▲ Win":"▼ Lose"}</div>}</div>
    <div style={S.modalField}><label style={S.modalLabel}>カテゴリ</label><div style={S.catGrid}>{categories.map(cat=>{const color=getCatColor(catColors,cat);return<button key={cat} style={{...S.catOption,...(category===cat?{background:color,color:"#fff",borderColor:color}:{})}} onClick={()=>setCategory(cat)}>{cat}</button>;})}<button style={S.catOptionAdd} onClick={()=>setShowNewCat(!showNewCat)}>＋ 新規</button></div>{showNewCat&&<div style={S.newCatRow}><input style={S.newCatInput} value={newCatName} onChange={e=>setNewCatName(e.target.value)} placeholder="カテゴリ名" onKeyDown={e=>e.key==="Enter"&&handleAddNewCat()} autoFocus/><button style={S.newCatSaveBtn} onClick={handleAddNewCat}>登録</button></div>}</div>
    <div style={S.modalField}><label style={S.modalLabel}>メモ</label><input style={S.memoInput} value={memo} onChange={e=>setMemo(e.target.value)} placeholder="メモを入力（任意）"/></div>
    <div style={S.modalActions}>{isEdit&&<button style={S.deleteBtn} onClick={onDelete}>削除</button>}<button style={{...S.saveBtn,...(valid?{}:{opacity:0.4})}} onClick={()=>valid&&onSave({amount:numAmount,memo,category:category||"未分類",win_lose:getWinLose(numAmount)})}>{isEdit?"更新":"記録する"}</button></div>
  </div></div>);
}
